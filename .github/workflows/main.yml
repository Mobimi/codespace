name: Build BedrockClient DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone ImGui
        run: git clone https://github.com/ocornut/imgui.git BedrockClient_final/BedrockClient/vendor/imgui

      - name: Configure CMake
        run: cmake -B build -A x64 -S BedrockV2

      - name: Build DLL
        run: cmake --build build --config Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BedrockClient-DLL
          path: build/Release/BedrockClient.dll
