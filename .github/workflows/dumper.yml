name: IL2CPP Dumper

on:
  workflow_dispatch:
  push:
    tags:
      - 'Data'

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Download Il2CppDumper
        run: |
          DUMPER_VERSION="6.7.46"
          DUMPER_ZIP="Il2CppDumper-net6-v${DUMPER_VERSION}.zip"
          DOWNLOAD_URL="https://github.com/Perfare/Il2CppDumper/releases/download/v${DUMPER_VERSION}/${DUMPER_ZIP}"

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -H "User-Agent: GitHubActions/1.0" \
            --location \
            --output "${DUMPER_ZIP}" \
            "${DOWNLOAD_URL}"

          unzip -q "${DUMPER_ZIP}" -d DumperTool

      - name: Write Il2CppDumper config.json to working directory
        run: |
          printf '%s\n' \
            '{' \
            '  "forceSave": true,' \
            '  "ignoreJsonFormatError": true,' \
            '  "dumpMethod": true,' \
            '  "dumpField": true,' \
            '  "dumpProperty": true,' \
            '  "dumpAttribute": true,' \
            '  "dumpFieldOffset": true,' \
            '  "dumpMethodOffset": true,' \
            '  "dumpTypeDefIndex": true,' \
            '  "scriptJson": true' \
            '}' > config.json

      - name: Download Data.zip from private release
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: ${{ github.repository }}
          version: 'tags/Data'
          file: 'Data.zip'
          target: 'Data.zip'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract game data
        run: |
          unzip -q Data.zip -d GameData

      - name: Ép Vá Lỗi Header Mã Hóa (Bypass)
        id: locate
        run: |
          UNITY_PATH=$(find GameData -type f -name "UnityFramework" -print -quit)
          META_PATH=$(find GameData -type f -name "global-metadata.dat" -print -quit)
          
          if [ -z "$UNITY_PATH" ] || [ -z "$META_PATH" ]; then
            echo "::error::Thiếu file Unity hoặc Metadata!"
            exit 1
          fi

          MAGIC_HEX=$(xxd -p -l 4 "$META_PATH")
          echo "Mã Header gốc: $MAGIC_HEX"

          if [ "$MAGIC_HEX" != "af1bb1fa" ]; then
            echo "PHÁT HIỆN HEADER LẠ ($MAGIC_HEX)! Đang tiến hành cưỡng chế vá lỗi bằng Hex Edit..."
            # Lệnh Hex Edit: Đè chuỗi hex AF 1B B1 FA vào 4 byte đầu tiên của file
            printf '\xaf\x1b\xb1\xfa' | dd of="$META_PATH" bs=1 seek=0 count=4 conv=notrunc
            
            NEW_MAGIC=$(xxd -p -l 4 "$META_PATH")
            echo "Đã vá thành công! Mã Header mới: $NEW_MAGIC"
          else
            echo "Mã Header chuẩn, không cần vá."
          fi

          echo "unity_path=$UNITY_PATH" >> "$GITHUB_OUTPUT"
          echo "meta_path=$META_PATH"   >> "$GITHUB_OUTPUT"

      - name: Locate Il2CppDumper.dll
        id: locate_dll
        run: |
          DLL_PATH=$(find DumperTool -type f -name "Il2CppDumper.dll" -print -quit)
          echo "dll_path=$DLL_PATH" >> "$GITHUB_OUTPUT"

      - name: Run Il2CppDumper
        run: |
          mkdir -p Output
          UNITY_PATH="${{ steps.locate.outputs.unity_path }}"
          META_PATH="${{ steps.locate.outputs.meta_path }}"
          DLL_PATH="${{ steps.locate_dll.outputs.dll_path }}"

          dotnet "$DLL_PATH" "$UNITY_PATH" "$META_PATH" "Output" < /dev/null

      - name: Upload LQM-Offsets artifact
        uses: actions/upload-artifact@v4
        with:
          name: LQM-Offsets
          path: Output/
