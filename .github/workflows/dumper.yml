name: IL2CPP Dumper

on:
  workflow_dispatch:
  push:
    tags:
      - 'Data'

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup .NET ────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # ── 3. Download Il2CppDumper ─────────────────────────────────────────────
      - name: Download Il2CppDumper
        run: |
          DUMPER_VERSION="6.7.40"
          DUMPER_ZIP="Il2CppDumper-net6-v${DUMPER_VERSION}.zip"
          DOWNLOAD_URL="https://github.com/Perfare/Il2CppDumper/releases/download/v${DUMPER_VERSION}/${DUMPER_ZIP}"

          echo "Downloading: ${DOWNLOAD_URL}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -H "User-Agent: GitHubActions/1.0" \
            --location \
            --output "${DUMPER_ZIP}" \
            "${DOWNLOAD_URL}"

          FILE_SIZE=$(stat -c%s "${DUMPER_ZIP}")
          echo "Downloaded size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "::error::Download too small — likely a redirect or 404."
            exit 1
          fi

          unzip -q "${DUMPER_ZIP}" -d DumperTool
          echo "Extracted Il2CppDumper contents:"
          find DumperTool -type f | sort

      # ── 4. Write Il2CppDumper config.json ───────────────────────────────────
      #
      #  WHY: Il2CppDumper calls Console.ReadKey() on any error in its default
      #  mode, which crashes non-TTY CI runners with exit 134, hiding the real
      #  error. "forceSave": true disables that interactive prompt entirely.
      #
      #  NOTE: We use printf instead of a heredoc (cat << EOF) because a bare
      #  EOF terminator at column 0 inside a GitHub Actions "run: |" block
      #  ends the YAML block scalar early, causing a workflow parse error.
      #
      - name: Write Il2CppDumper config.json
        run: |
          DLL_DIR=$(dirname "$(find DumperTool -name 'Il2CppDumper.dll' -print -quit)")
          echo "Placing config.json in: $DLL_DIR"

          printf '%s\n' \
            '{' \
            '  "forceSave": true,' \
            '  "ignoreJsonFormatError": true,' \
            '  "dumpMethod": true,' \
            '  "dumpField": true,' \
            '  "dumpProperty": true,' \
            '  "dumpAttribute": true,' \
            '  "dumpFieldOffset": true,' \
            '  "dumpMethodOffset": true,' \
            '  "dumpTypeDefIndex": true,' \
            '  "scriptJson": true' \
            '}' > "${DLL_DIR}/config.json"

          echo "config.json written:"
          cat "${DLL_DIR}/config.json"

      # ── 5. Download your private Data.zip ───────────────────────────────────
      - name: Download Data.zip from private release
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: ${{ github.repository }}
          version: 'tags/Data'
          file: 'Data.zip'
          target: 'Data.zip'
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract & verify Data.zip ────────────────────────────────────────
      - name: Extract and inspect game data
        run: |
          FILE_SIZE=$(stat -c%s "Data.zip")
          echo "Data.zip size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::Data.zip is empty or failed to download."
            exit 1
          fi

          unzip -q Data.zip -d GameData
          echo "All extracted files:"
          find GameData -type f | sort

      # ── 7. Locate files and inspect magic bytes ──────────────────────────────
      #
      #  Checks global-metadata.dat header to detect encryption:
      #    af 1b b1 fa  → valid / unencrypted  ✓
      #    anything else → encrypted (need Frida live dump instead)
      #
      - name: Locate files and inspect file headers
        id: locate
        run: |
          echo "::group::Locating IL2CPP binary"
          UNITY_PATH=$(find GameData -type f \( \
            -name "UnityFramework" \
            -o -name "libil2cpp.so" \
            -o -name "GameAssembly.dll" \
          \) -print -quit)

          if [ -z "$UNITY_PATH" ]; then
            echo "::error::No IL2CPP binary found (tried UnityFramework, libil2cpp.so, GameAssembly.dll)"
            find GameData -type f | sort
            exit 1
          fi
          echo "Found binary : $UNITY_PATH"
          echo "Magic bytes  : $(xxd -l 4 "$UNITY_PATH" | head -1)"
          echo "::endgroup::"

          echo "::group::Locating global-metadata.dat"
          META_PATH=$(find GameData -type f -name "global-metadata.dat" -print -quit)

          if [ -z "$META_PATH" ]; then
            echo "::error::global-metadata.dat not found in GameData/"
            find GameData -type f | sort
            exit 1
          fi
          echo "Found metadata : $META_PATH"
          echo "Magic bytes    : $(xxd -l 4 "$META_PATH" | head -1)"

          MAGIC_HEX=$(xxd -p -l 4 "$META_PATH")
          echo "Raw hex        : $MAGIC_HEX"

          if [ "$MAGIC_HEX" != "af1bb1fa" ]; then
            echo "::warning::Metadata does NOT start with 'af 1b b1 fa' — likely ENCRYPTED."
            echo "::warning::Il2CppDumper cannot dump encrypted metadata offline."
            echo "::warning::You will need a Frida-based live device dump instead."
          else
            echo "Metadata magic bytes valid (unencrypted) ✓"
          fi
          echo "::endgroup::"

          echo "unity_path=$UNITY_PATH" >> "$GITHUB_OUTPUT"
          echo "meta_path=$META_PATH"   >> "$GITHUB_OUTPUT"

      # ── 8. Locate Il2CppDumper.dll ───────────────────────────────────────────
      - name: Locate Il2CppDumper.dll
        id: locate_dll
        run: |
          DLL_PATH=$(find DumperTool -type f -name "Il2CppDumper.dll" -print -quit)
          if [ -z "$DLL_PATH" ]; then
            echo "::error::Il2CppDumper.dll not found:"
            find DumperTool -type f | sort
            exit 1
          fi
          DLL_DIR=$(dirname "$DLL_PATH")
          echo "DLL     : $DLL_PATH"
          echo "DLL dir : $DLL_DIR"
          echo "dll_path=$DLL_PATH" >> "$GITHUB_OUTPUT"
          echo "dll_dir=$DLL_DIR"   >> "$GITHUB_OUTPUT"

      # ── 9. Run Il2CppDumper ──────────────────────────────────────────────────
      - name: Run Il2CppDumper
        run: |
          mkdir -p Output

          UNITY_PATH="${{ steps.locate.outputs.unity_path }}"
          META_PATH="${{ steps.locate.outputs.meta_path }}"
          DLL_PATH="${{ steps.locate_dll.outputs.dll_path }}"

          echo "Il2CppDumper.dll : $DLL_PATH"
          echo "Binary           : $UNITY_PATH"
          echo "Metadata         : $META_PATH"
          echo "Output dir       : Output/"

          # stdin < /dev/null: safety net so Console.ReadKey() gets EOF
          # instead of crashing with exit 134 if it is ever reached despite
          # forceSave:true in config.json
          dotnet "$DLL_PATH" \
            "$UNITY_PATH" \
            "$META_PATH" \
            "Output" \
            < /dev/null

          echo "Output files generated:"
          find Output -type f | sort

      # ── 10. Verify output ─────────────────────────────────────────────────────
      - name: Verify dumper output
        run: |
          if [ ! -f "Output/script.json" ]; then
            echo "::error::script.json not produced — dump likely failed."
            find Output -type f | sort
            exit 1
          fi
          SCRIPT_SIZE=$(stat -c%s "Output/script.json")
          echo "script.json found ✓ (${SCRIPT_SIZE} bytes)"
          find Output -type f | sort

      # ── 11. Upload artifact ───────────────────────────────────────────────────
      - name: Upload LQM-Offsets artifact
        uses: actions/upload-artifact@v4
        with:
          name: LQM-Offsets
          path: Output/
          if-no-files-found: error
          retention-days: 30
