name: Il2Cpp Dumper LQM

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Tạo thư mục làm việc
        run: mkdir dumper_workspace

      - name: Tự động xin link & Tải vũ khí (Bất tử)
        run: |
          cd dumper_workspace
          echo "Đang cầu viện API Github để lấy link gốc..."
          
          # Dùng API cào thẳng link file Zip mới nhất của tác giả Perfare
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/Perfare/Il2CppDumper/releases/latest | grep "browser_download_url" | grep -i "\.zip" | head -n 1 | cut -d '"' -f 4)
          
          echo "Đã khóa mục tiêu: $DOWNLOAD_URL"
          
          # Tải về bằng link chuẩn xác 100%
          curl -L -o dumper.zip "$DOWNLOAD_URL"
          unzip -q dumper.zip -d DumperTool

      - name: Kéo file Game từ kho chứa của Pháp sư
        run: |
          cd dumper_workspace
          # Đã dán link xịn của bác vào đây
          curl -L -o data.zip "https://github.com/Mobimi/codespace/releases/download/Data/Data.zip"
          
          echo "Đang bung nén cục hàng 200MB..."
          unzip -q data.zip -d GameData

      - name: Đập hộp & Dịch ngược
        run: |
          cd dumper_workspace
          mkdir output
          
          UNITY_FILE=$(find GameData -type f -name "UnityFramework" | head -n 1)
          META_FILE=$(find GameData -type f -name "global-metadata.dat" | head -n 1)
          
          echo "Tìm thấy UnityFramework tại: $UNITY_FILE"
          echo "Tìm thấy Metadata tại: $META_FILE"
          
          # Ép máy chủ dùng .NET để chạy tool (Bao mượt trên Linux)
          dotnet DumperTool/Il2CppDumper.dll "$UNITY_FILE" "$META_FILE" output/ || true

      - name: Gói Offsets trả về
        uses: actions/upload-artifact@v4
        with:
          name: LQM-Offsets-Json
          path: dumper_workspace/output/
