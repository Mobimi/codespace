name: Il2Cpp Dumper LQM

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Tạo thư mục làm việc
        run: mkdir dumper_workspace

      - name: Tải vũ khí Il2CppDumper
        run: |
          cd dumper_workspace
          wget -q -O dumper.zip https://github.com/Perfare/Il2CppDumper/releases/download/v6.7.40/Il2CppDumper-linux-v6.7.40.zip
          unzip -q dumper.zip -d DumperTool
          chmod +x DumperTool/Il2CppDumper

      - name: Kéo file từ GitHub Releases (Tốc độ VIP)
        run: |
          cd dumper_workspace
          # DÁN CÁI LINK BÁC VỪA COPY VÀO TRONG CẶP NGOẶC KÉP NÀY
          curl -L -o data.zip "LINK_CỦA_BÁC_Ở_ĐÂY"
          
          echo "Đang bung nén cục hàng..."
          unzip -q data.zip -d GameData

      - name: Đập hộp & Dịch ngược
        run: |
          cd dumper_workspace
          mkdir output
          
          # Truy tìm dấu vết 2 file
          UNITY_FILE=$(find GameData -type f -name "UnityFramework" | head -n 1)
          META_FILE=$(find GameData -type f -name "global-metadata.dat" | head -n 1)
          
          echo "Tìm thấy UnityFramework tại: $UNITY_FILE"
          echo "Tìm thấy Metadata tại: $META_FILE"
          
          # Đưa lên thớt dịch ngược
          ./DumperTool/Il2CppDumper "$UNITY_FILE" "$META_FILE" output/ || true

      - name: Gói Offsets trả về
        uses: actions/upload-artifact@v4
        with:
          name: LQM-Offsets-Json
          path: dumper_workspace/output/
