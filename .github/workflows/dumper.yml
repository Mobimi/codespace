name: Il2Cpp Dumper LQM

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Workspace
        run: |
          mkdir -p work/output
          mkdir -p work/DumperTool
          mkdir -p work/GameData

      - name: Download Il2CppDumper
        run: |
          cd work
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/Perfare/Il2CppDumper/releases/latest | grep "browser_download_url" | grep -i "\.zip" | head -n 1 | cut -d '"' -f 4)
          curl -L -o dumper.zip "$DOWNLOAD_URL"
          unzip -q dumper.zip -d DumperTool

      - name: Download & Extract Game Data
        run: |
          cd work
          # Link Release của bác
          curl -L -o data.zip "https://github.com/Mobimi/codespace/releases/download/Data/Data.zip"
          unzip -o -q data.zip -d GameData
          
          # Liệt kê file để debug (xem trong log Action nếu lỗi)
          echo "--- Cấu trúc file tìm thấy ---"
          find GameData -type f

      - name: Execute Dumper
        run: |
          cd work
          # Tự động định vị file (Bất kể thư mục nào)
          UNITY=$(find GameData -type f -name "UnityFramework" | head -n 1)
          META=$(find GameData -type f -name "global-metadata.dat" | head -n 1)
          
          echo "Unity: $UNITY"
          echo "Metadata: $META"
          
          if [ -z "$UNITY" ] || [ -z "$META" ]; then
            echo "LỖI: Thiếu file UnityFramework hoặc global-metadata.dat!"
            exit 1
          fi

          # Chạy dumper
          dotnet DumperTool/Il2CppDumper.dll "$UNITY" "$META" output/

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: LQM-Offsets-Json
          path: work/output/
          if-no-files-found: error
